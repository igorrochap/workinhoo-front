name: Notify parent repo of update

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Send repository_dispatch to parent
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PARENT_REPO_PAT }}
          repository: quokequack/workinhoo
          event-type: submodule-update
          client-payload: >
            {
              "submodule_path": "workinhoo-front",
              "commit_sha": "${{ github.event.workflow_run.head_sha }}",
              "commit_message": ${{ toJSON(github.event.workflow_run.head_commit.message) }}
            }